<!doctype html>



<html lang="en" class="no-transitions Block-DarkMode-Extensions">
    <head>
        <meta charset="utf-8">

        <title>Portfolio</title>

        <base href="/">

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="color-scheme" content="light dark">
        <meta name="darkreader-lock">

        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
        <link rel="manifest" href="manifest.webmanifest">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">

        <script>
            (function() {
                try {
                    var Match = document.cookie.match(/Interface-Theme=([^;]+)/);
                    var Theme = (Match && Match[1]) || localStorage.getItem('Interface-Theme') || 'Primary';

                    document.documentElement.classList.add('Theme--' + Theme);
                } catch (e) {
                    document.documentElement.classList.add('Theme--Primary');
                }
            })();
        </script>
    </head>

    <body>
        <app-root></app-root>
        <noscript>Please enable JavaScript to continue using this application.</noscript>
    </body>
</html>
