<div class = "Main Wrapper">
    <div
        class = "Section-Wrapper"
        FancySlideUpDown>

        <FancyContainer 
            class = "Content-Section-Wrapper"
            [ngClass] = "InterfaceService.GetStatusClasses()">
            <div class = "Content-Section">
                <span
                    class = "Section-Title"
                    [FancyTypewriter] = "InterfaceService.T().Portfolio">
                </span>

                <FancyMultibutton
                    class = "ActionType-Multibutton"

                    [Items] = "AuthenticationButtons()"
                    [ShowHighlight] = "true"
                    
                    DisplayMode = "Text">
                </FancyMultibutton>

                <div
                    class = "Form-Fields-Wrapper"

                    [ngClass] = "GetFormFieldsClasses">
                    <div class = "Extra-Fields-Container">
                        <FancyTextbox
                            #EmailTextbox
                            class = "Input-Field"
                            [Placeholder] = "InterfaceService.T().Email"
                            Icon = "envelope">
                        </FancyTextbox>

                        <FancyTextbox
                            #PhoneNumberTextbox
                            class = "Input-Field"
                            [Placeholder] = "InterfaceService.T().PhoneNumber"
                            Icon = "phone"
                            [OnlyAllow] = "'0123456789+-()'">
                        </FancyTextbox>
                    </div>

                    <div class = "Main-Fields-Container">
                        <FancyTextbox
                            #MainIdentifierTextbox
                            class = "Input-Field"
                            [Placeholder] = "CurrentFormType() === 'Sign In' ? InterfaceService.T().UserIdentifier : InterfaceService.T().Username"
                            [Icon] = "CurrentFormType() === 'Sign In' ? 'user' : 'at'">
                        </FancyTextbox>

                        <FancyTextbox
                            #PasswordTextbox
                            class = "Input-Field"
                            [Placeholder] = "InterfaceService.T().Password"
                            [IsSensitive] = "true"
                            Icon = "lock">
                        </FancyTextbox>
                    </div>
                </div>

                <div class = "Secondary-Actions-Container">
                    <FancyCheckbox
                        class = "RememberMe-Checkbox"
                        [Label] = "InterfaceService.T().RememberMe"
                        [Checked] = "false">
                    </FancyCheckbox>
                </div>

                <div class = "Buttons-Container">
                    <FancyButton
                        class = "Action-Button"
                        [Label] = "CurrentFormType() === 'Sign In' ? InterfaceService.T().SignIn : InterfaceService.T().SignUp"
                        (Up) = "HandleSubmit()">
                    </FancyButton>

                    <FancyButton
                        class = "Secondary-Action-Button"
                        [Label] = "InterfaceService.T().AccountRecovery"
                        (Up) = "HandleAccountRecovery()">
                    </FancyButton>
                </div>

            </div>
        </FancyContainer>

        <!--
        <div class = "Minibuttons-Justified-Container">
            <FancyMinibutton Icon = "house" (click) = "NavigateToHome()"></FancyMinibutton>
            <FancyMinibutton Icon = "sun" (click) = "ToggleTheme($event)"></FancyMinibutton>
            <FancyMinibutton Icon = "moon" (click) = "ToggleTheme($event)"></FancyMinibutton>
            <FancyMinibutton Icon = "logo"></FancyMinibutton>
        </div>
        -->
    </div>
</div>
