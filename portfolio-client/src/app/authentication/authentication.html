<Aurora/>

<div class = "Logo-Container">
    <div class = "Logo"></div>
</div>

<FancyDropdown
    class = "Language-Dropdown"
    [Items] = "(LanguageItems())">
</FancyDropdown>

<FancyMinibutton
    class = "Theme-Toggle-Minibutton"
    [Icon] = "ThemeIcon()"
    (click) = "ToggleTheme($event)">
</FancyMinibutton>

<FancyMultibutton
    class = "RouteSelector-Multibutton"

    [Items] = "(RouteSelectorItems)"
    [Vertical] = "true"
    [ShowIndicator] = "true"

    DisplayMode = "Icon">
</FancyMultibutton>

<div class = "Main Wrapper">
    <div
        class = "Section-Wrapper"

        [ngClass] = "(IsLoading)">

        <FancyContainer class = "Content-Section-Wrapper">
            <div class = "Content-Section">
                <span
                    class = "Section-Title"
                    [FancyTypewriter] = "(InterfaceService.T().Portfolio)">
                </span>

                <FancyMultibutton
                    class = "ActionType-Multibutton"

                    [Items] = "(AuthenticationButtons())"
                    [ShowHighlight] = "true"

                    DisplayMode = "Text">
                </FancyMultibutton>

                <div
                    class = "Form-Fields-Wrapper"

                    [ngClass] = "(GetFormFieldsClasses)">
                    <div class = "Extra-Fields-Container">
                        <FancyTextbox
                            #EmailTextbox
                            class = "Input-Field"
                            [Placeholder] = "(InterfaceService.T().Email)"
                            Icon = "envelope">
                        </FancyTextbox>

                        <FancyTextbox
                            #PhoneNumberTextbox
                            class = "Input-Field"
                            [Placeholder] = "(InterfaceService.T().PhoneNumber)"
                            Icon = "phone">
                        </FancyTextbox>
                    </div>

                    <div class = "Main-Fields-Container">
                        <FancyTextbox
                            #IdentifierTextbox
                            class = "Input-Field"
                            [Placeholder] = "(CurrentFormType() === 'Sign In' ? InterfaceService.T().UserIdentifier : InterfaceService.T().Username)"
                            Icon = "at">
                        </FancyTextbox>

                        <FancyTextbox
                            #PasswordTextbox
                            class = "Input-Field"
                            [Placeholder] = "(InterfaceService.T().Password)"
                            [IsSensitive] = "true"
                            Icon = "lock">
                        </FancyTextbox>
                    </div>
                </div>

                <FancyCheckbox
                    class = "Input-Field"
                    [Label] = "(InterfaceService.T().RememberMe)"
                    [Checked] = "false">
                </FancyCheckbox>

                <div class = "Buttons-Container">
                    <FancyButton
                        class = "Action-Button"
                        [Label] = "(CurrentFormType() === 'Sign In' ? InterfaceService.T().SignIn : InterfaceService.T().SignUp)"
                        (Up) = "HandleSubmit()">
                    </FancyButton>
                </div>
            </div>
        </FancyContainer>
    </div>
</div>
