<Aurora/> 

<div class = "Logo-Container">
    <div class = "Logo"></div>
    
    <FancyButton
        Label = "Toggle Glow"
        Icon = ""
        (Up) = "ToggleTheme()">
    </FancyButton>
</div>

<FancyMultibutton
    class = "RouteSelector-Multibutton"
    [Items] = "RouteSelectorItems"
    [Vertical] = "true"
    [ShowIndicator] = "true"
    DisplayMode = "Icon">
</FancyMultibutton>

<div class = "Main Wrapper">
    <div 
        class = "Section-Wrapper"
        [ngClass] = "IsLoading">
        
        <FancyContainer class = "Content-Section-Wrapper">
            <div class = "Content-Section">
                <span class = "Section-Title">Portfolio</span>

                <FancyMultibutton
                    class = "ActionType-Multibutton"
                    [Items] = "AuthenticationButtons"
                    [ShowHighlight] = "true"
                    DisplayMode = "Text">
                </FancyMultibutton>

                <ng-container *ngIf = "CurrentFormType() === 'Sign In'">
                    <FancyTextbox #UserIdentifierTextbox
                        class = "Input-Field"
                        Placeholder = "User Identifier"
                        Styled = "Standard"
                        IconStyled = "Standard"
                        Icon = "at">
                    </FancyTextbox>
                </ng-container>

                <ng-container *ngIf = "CurrentFormType() === 'Sign Up'">
                    <FancyTextbox #EmailTextbox
                        class = "Input-Field"
                        Placeholder = "Email"
                        Styled = "Standard"
                        IconStyled = "Standard"
                        Icon = "envelope">
                    </FancyTextbox>

                    <FancyTextbox #PhoneNumberTextbox
                        class = "Input-Field"
                        Placeholder = "Phone"
                        Styled = "Standard"
                        IconStyled = "Standard"
                        Icon = "phone">
                    </FancyTextbox>

                    <FancyTextbox #UsernameTextbox
                        class = "Input-Field"
                        Placeholder = "Username"
                        Styled = "Standard"
                        IconStyled = "Standard"
                        Icon = "at">
                    </FancyTextbox>
                </ng-container>

                <FancyTextbox #PasswordTextbox
                    class = "Input-Field"
                    [IsSensitive] = true
                    Placeholder = "Password"
                    Styled = "Standard"
                    IconStyled = "Standard"
                    Icon = "lock">
                </FancyTextbox>

                <FancyCheckbox
                    class = "Input-Field"
                    Label = "Remember me"
                    [Checked] = "false">
                </FancyCheckbox>

                <div class = "Buttons-Container">
                    <FancyButton 
                        class = "Action-Button"
                        [Label] = "CurrentFormType()"
                        (Up) = "HandleSubmit()">
                    </FancyButton>
                </div>
            </div>
        </FancyContainer>
    </div>
</div>
