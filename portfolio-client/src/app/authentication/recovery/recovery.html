<div class = "Main Wrapper">
    <div
        class = "Section-Wrapper"
        FancySlideUpDown>

        <FancyContainer class = "Content-Section-Wrapper">
            <div class = "Content-Section">
                <div class = "Section-Title-Container">
                    <span
                        class = "Section-Title"
                        [FancyTypewriter] = "(InterfaceService.T().RecoveryIntro)">
                    </span>

                    <FancyDropdown
                        class = "Recovery-Dropdown"
                        [Type] = "InterfaceService.InterfaceType()"
                        [Items] = "RecoveryOptions()"
                        [SelectedItem] = "SelectedOption()"
                        (SelectionChange) = "OnSelectionChange($event)">
                    </FancyDropdown>
                </div>

                <div class = "Form-Fields-Wrapper" [class.Is-Password-Mode] = "SelectedRecoveryType() === 'Password'">
                    <div class = "Form-Fields-Horizontal-Group">
                        <div class = "Animation-Container Left-Field">
                            <FancyTextbox
                                class = "Input-Field"
                                [Placeholder] = "FirstTextboxPlaceholder()"
                                [Icon] = "FirstTextboxIcon()"
                                [OnlyAllow] = "FirstTextboxOnlyAllow()">
                            </FancyTextbox>
                        </div>
                        <span class = "Separator-Text">{{ InterfaceService.T().OR }}</span>
                        <div class = "Animation-Container Right-Field">
                            <FancyTextbox
                                class = "Input-Field"
                                [Placeholder] = "SecondTextboxPlaceholder()"
                                [Icon] = "SecondTextboxIcon()"
                                [OnlyAllow] = "SecondTextboxOnlyAllow()">
                            </FancyTextbox>
                        </div>
                    </div>
                    
                    <div class = "Unique-Textbox-Wrapper">
                        <div class = "Animation-Container Unique-Field">
                            <FancyTextbox
                                class = "Input-Field"
                                [Placeholder] = "InterfaceService.T().UserIdentifier"
                                Icon = "user">
                            </FancyTextbox>
                        </div>
                    </div>
                </div>

                <div class = "Buttons-Container">
                    <FancyButton
                        class = "Action-Button"
                        [Label] = "(InterfaceService.T().Continue)"
                        (Up) = "null">
                    </FancyButton>

                </div>
            </div>
        </FancyContainer>
    </div>
</div>
