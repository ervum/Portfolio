<DeepBackground/>
<Aurora/>

<FancyMinibutton
    class = "Back-Minibutton"
    [class.Home] = "SelectedIndex() === 0"
    [Tabindex] = "SelectedIndex() === 0 ? -1 : 0"
    Icon = "/assets/icons/shaftless-next-arrow.png"
    (click) = "NavigateBack()">
</FancyMinibutton>

<div class = "Logo-Container">
    <div class = "Logo"></div>
</div>

<FancyDropdown
    class = "Language-Dropdown"
    [class.Home] = "SelectedIndex() === 0"
    [Items] = "(LanguageItems())"
    [SelectedItem] = "CurrentLanguageItem()">
</FancyDropdown>

<FancyMultibutton
    class = "RouteSelector-Multibutton"

    [Items] = "RouteSelectorItems"
    [(SelectedIndex)] = "SelectedIndex"
    [Vertical] = "true"
    [ShowIndicator] = "true"

    DisplayMode = "Icon">
</FancyMultibutton>

<div class = "Theme-Toggle-Wrapper">
    <FancyMinibutton
        class = "Theme-Toggle-Minibutton"
        [Icon] = "ThemeIcon()"
        [Animated] = "false"
        [Disabled] = "InterfaceService.DarkModeExtensionActive()"
        
        (click) = "ToggleTheme($event)">
    </FancyMinibutton>

    <FancyTooltip
        class = "Theme-Toggle-Tooltip"
        [Message] = "InterfaceService.T().ExtensionWarningTooltip"
        [Active] = "InterfaceService.DarkModeExtensionActive()"
        [Fixed] = "false"
        [ArrowLeft] = "true">
    </FancyTooltip>
</div>

<router-outlet />
