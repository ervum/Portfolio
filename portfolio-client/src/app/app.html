<DeepBackground/>
<Aurora/>

<FancyMinibutton
    class = "Back-Minibutton"
    [class.Home] = "SelectedIndex() === 0"
    Icon = "/assets/icons/next.png"
    (click) = "NavigateBack()">
</FancyMinibutton>

<div class = "Logo-Container">
    <div class = "Logo"></div>
</div>

<FancyDropdown
    class = "Language-Dropdown"
    [class.Home] = "SelectedIndex() === 0"
    [Items] = "(LanguageItems())"
    [SelectedItem] = "CurrentLanguageItem()">
</FancyDropdown>

<FancyMinibutton
    class = "Theme-Toggle-Minibutton"
    [Icon] = "ThemeIcon()"
    [Animated] = "false"
    [Disabled] = "InterfaceService.DarkModeExtensionActive()"
    
    (click) = "ToggleTheme($event)">
</FancyMinibutton>

<FancyMultibutton
    class = "RouteSelector-Multibutton"

    [Items] = "RouteSelectorItems"
    [(SelectedIndex)] = "SelectedIndex"
    [Vertical] = "true"
    [ShowIndicator] = "true"

    DisplayMode = "Icon">
</FancyMultibutton>

<div
    class = "Extension-Warning-Tooltip-Wrapper"
    [class.Extension-Warning-Tooltip-Wrapper--Active] = "InterfaceService.DarkModeExtensionActive()">

    <FancyContainer class = "Extension-Warning-Tooltip">
        <span [FancyTypewriter] = "InterfaceService.T().ExtensionWarningTooltip"></span>
    </FancyContainer>
</div>

<router-outlet />
