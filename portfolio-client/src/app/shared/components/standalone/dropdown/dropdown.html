<div class = "FancyDropdown-Trigger-Wrapper">
    <FancyContainer
        class = "FancyDropdown-Trigger"
        [Type] = "EffectiveType()"
        (click) = "Toggle()">
        
        <div class = "FancyDropdown-Label-Wrapper">
            <span class = "FancyDropdown-Label">{{ TriggerDisplayLabel }}</span>
        </div>

        <FancyContainer class = "FancyDropdown-Icon-Container" [Type] = "EffectiveType()">
            <div class = "FancyDropdown-Icon"></div>
        </FancyContainer>
    </FancyContainer>
</div>

<div 
    class = "FancyDropdown-List-Wrapper"
    [class.Is-Open] = "IsOpen">

    <FancyContainer
        class = "FancyDropdown-List"
        [Type] = "EffectiveType()">
        
        <ng-container *ngFor = "let Item of Items">
            <div 
                *ngIf = "(Item !== SelectedItem)"
                class = "FancyDropdown-Item"
                (click) = "Select(Item)">
                <span class = "FancyDropdown-Item-Label">{{ GetItemDisplayLabel(Item) }}</span>
            </div>
        </ng-container>
    </FancyContainer>
</div>
