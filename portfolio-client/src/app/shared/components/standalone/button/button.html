<div
  class = "FancyButton-Wrapper"

  [ngClass] = "(GetWrapperClasses())"

  [ngStyle] = "(GetWrapperStyles)">
  <FancyContainer
    #ButtonElement

    role = "button"

    tabindex = "0"

    class = "FancyButton"

    [Type] = "(EffectiveType())"

    [ngClass] = "(GetButtonClasses())"

    (pointerenter) = "OnHover()"
    (pointermove) = "OnMove($event)"
    (pointerleave) = "OnUnhover()"

    (pointercancel) = "OnCancel()"

    (pointerdown) = "OnDown($event)"
    (pointerup) = "OnUp($event)"

    (keydown) = "OnKeyDown()"
    (keyup) = "OnKeyUp()"

    (wheel) = "OnWheel()"

    (focus) = "OnFocus()"
    (blur) = "OnUnfocus()">
    <div class = "FancyButton-Label-Wrapper">
      <span class = "FancyButton-Label">{{ DisplayLabel }}</span>
    </div>

    @if (Icon !== '') {
      <FancyContainer
        class = "FancyButton-Icon-Container"

        [Type] = "(EffectiveType())"

        [ngClass] = "(GetIconClasses())">
        <div
          class = "FancyButton-Icon"

          [ngClass] = "(GetIconClasses())"

          (animationend) = "OnIconAnimationEnd()">
        </div>
      </FancyContainer>
    }
  </FancyContainer>
</div>
